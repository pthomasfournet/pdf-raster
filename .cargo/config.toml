[build]
# Cap parallel jobs to half the logical CPUs to avoid RAM spikes during
# debug builds (each codegen unit needs ~300–600 MiB of LLVM working set).
jobs = 6
# Compile for the host CPU by default.  The explicit SIMD paths in raster/
# and gpu/ already use is_x86_feature_detected! for runtime dispatch, but
# this lets LLVM auto-vectorise the rest of the code with the host's full
# vector width.  Override per-machine when building for a different target
# (e.g. on the i7-8700K testbench: RUSTFLAGS="-C target-cpu=skylake").
#
# Cargo precedence note: the RUSTFLAGS env var fully *replaces* this value
# (it does not append).  If a script needs to add flags (e.g. `-D warnings`),
# it must include `-C target-cpu=native` itself or auto-vectorisation drops
# back to the generic-x86_64 baseline.
rustflags = ["-C", "target-cpu=native"]

[profile.test]
# Single codegen unit per crate in test builds.  The test binary for
# pdf_interp grows to ~96 MiB with the default split; one CGU halves that.
codegen-units = 1

[test]
# Run tests serially to prevent concurrent large allocations from OOMing.
# pdf_interp has tests with multi-hundred-MiB working sets; parallelism kills
# the machine under cargo test --lib.
test-threads = 1
