name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── CPU-only build and test ─────────────────────────────────────────────────
  #
  # Builds and tests without any GPU features to verify that all CPU fallback
  # paths compile and work correctly on a standard GitHub-hosted runner (no
  # CUDA toolkit, no nvJPEG, no GPU hardware).  This catches regressions where
  # GPU-feature-gated code accidentally bleeds into the always-compiled paths.
  #
  # The runner is ubuntu-latest (x86-64), which has AVX2 but not AVX-512 —
  # representative of the entire Intel consumer desktop line (all Alder/Raptor/
  # Arrow Lake CPUs have AVX-512 disabled).  The AVX2 and scalar fallback tiers
  # are exercised on every push.
  cpu-only:
    name: CPU-only (no GPU features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cpu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cpu-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libfreetype6-dev

      - name: Build CLI (CPU-only, release)
        run: cargo build --release -p pdf-raster

      - name: Test pdf_interp (resource decoding, CPU paths)
        run: cargo test -p pdf_interp --lib

      - name: Test raster (full unit suite — SIMD dispatch, fill, blend, popcnt)
        run: cargo test -p raster --lib

      - name: Test gpu (CMYK matrix — AVX2 and scalar parity)
        run: cargo test -p gpu --lib -- cmyk

      - name: Test pdf_raster (deskew, render helpers)
        run: cargo test -p pdf_raster --lib

      - name: Clippy (no GPU features)
        run: cargo clippy -p pdf_interp -p raster -p gpu -p pdf_raster -- -D warnings

  # ── aarch64 cross-check ───────────────────────────────────────────────────
  #
  # Cross-compiles (no execution) the CPU-only crates for aarch64 to keep the
  # NEON paths and cfg gates honest.  Uses `cargo check` only — no GPU features,
  # no CUDA, no execution.  A `cargo check` failure here means an aarch64
  # regression was introduced on x86-64.
  #
  # The `nightly-sve2` feature is also checked on nightly to keep the SVE2
  # intrinsic code compilable as the nightly stdarch evolves.
  aarch64-check:
    name: aarch64 cross-check (NEON + SVE2 nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain + aarch64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install nightly toolchain + aarch64 target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aarch64-

      - name: Check raster (stable, NEON)
        run: cargo check -p raster --target aarch64-unknown-linux-gnu

      - name: Check raster (nightly, NEON + SVE2)
        run: cargo +nightly check -p raster --target aarch64-unknown-linux-gnu --features nightly-sve2

      - name: Check gpu (stable, NEON CMYK path)
        run: cargo check -p gpu --target aarch64-unknown-linux-gnu

      # pdf_raster pulls in FreeType + libz C deps that require a cross C
      # compiler (gcc-aarch64-linux-gnu). Install it and check the full crate.
      - name: Install aarch64 cross C toolchain
        run: sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Check pdf_raster (stable, NEON deskew path)
        env:
          LIBZ_SYS_STATIC: 1
        run: cargo check -p pdf_raster --target aarch64-unknown-linux-gnu --features bundled

  # ── Format check ──────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
