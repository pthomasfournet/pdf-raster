[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**breaking** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat",     group = "Features"        },
    { message = "^fix",      group = "Bug Fixes"        },
    { message = "^perf",     group = "Performance"      },
    { message = "^refactor", group = "Refactor"         },
    { message = "^test",     group = "Testing"          },
    { message = "^docs",     group = "Documentation"    },
    { message = "^chore",    group = "Chores"           },
    { message = "^gpu",      group = "GPU"              },
    { message = "^renderer", group = "Renderer"         },
    { message = "^resources",group = "Resources"        },
    { message = "^raster",   group = "Raster"           },
    { message = "^font",     group = "Font"             },
    { message = "^color",    group = "Color"            },
    { message = "^encode",   group = "Encode"           },
    { message = "^cli",      group = "CLI"              },
    { message = ".*",        group = "Other"            },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
