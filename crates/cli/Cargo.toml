[package]
name    = "pdf-raster"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "pdf-raster"
path = "src/main.rs"

[features]
# Enable GPU-accelerated AA fill and tile fill via CUDA.  Mirrors pdf_interp/gpu-aa.
gpu-aa  = ["dep:gpu", "pdf_interp/gpu-aa"]
# Enable GPU-accelerated JPEG decoding via nvJPEG.  Mirrors pdf_interp/nvjpeg.
nvjpeg  = ["dep:gpu", "pdf_interp/nvjpeg"]
# Enable GPU-accelerated JPEG 2000 decoding via nvJPEG2000.  Mirrors pdf_interp/nvjpeg2k.
nvjpeg2k = ["dep:gpu", "pdf_interp/nvjpeg2k"]
# Enable GPU ICC CMYK→RGB transform.  Mirrors pdf_interp/gpu-icc.
gpu-icc = ["dep:gpu", "pdf_interp/gpu-icc"]

[dependencies]
pdf_interp  = { path = "../pdf_interp" }
gpu         = { path = "../gpu", optional = true }
lopdf       = "0.40"
encode      = { path = "../encode" }
color       = { path = "../color" }
raster      = { path = "../raster" }
clap        = { version = "4", features = ["derive"] }
rayon       = "1"
log         = { workspace = true }
env_logger  = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints.rust]
# cli binary: unsafe_code only allowed in pdf_bridge (the FFI crate)
unsafe_code    = "deny"
missing_docs   = "allow"   # binary crate; public docs are not required
unused_results = "warn"

[lints.clippy]
all      = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery  = { level = "warn", priority = -1 }
